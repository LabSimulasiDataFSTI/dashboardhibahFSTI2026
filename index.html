<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Data Hibah Fakultas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByRx4FpUxhkpODU_g4QPEUpRq48iWR4VE",
            authDomain: "hibahfsti.firebaseapp.com",
            projectId: "hibahfsti",
            storageBucket: "hibahfsti.firebasestorage.app",
            messagingSenderId: "760574296069",
            appId: "1:760574296069:web:bb3e3fbcb1857fc3bcdc6c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Pindahkan fungsi-fungsi ke window agar bisa diakses HTML
        window.db = db;
        window.collection = collection;
        window.onSnapshot = onSnapshot;
        window.addDoc = addDoc;
        window.updateDoc = updateDoc;
        window.doc = doc;
    </script>
    </head>
<body class="text-slate-800 p-4 md:p-8">
    <script type="module">
        let currentData = [];
        const db = window.db;

        // Listener Real-time (Ini yang membuat sinkronisasi antar pengguna)
        onSnapshot(collection(db, "hibah"), (snapshot) => {
            currentData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            updateDashboard(currentData);
        });

        // Simpan Data ke Firebase
        window.saveData = async (e) => {
            e.preventDefault();
            const id = document.getElementById('formId').value;
            const newData = {
                Ketua: document.getElementById('formKetua').value,
                Judul: document.getElementById('formJudul').value,
                "Program Studi": document.getElementById('formProdi').value,
                "Sumber Hibah": document.getElementById('formSumber').value,
                Dana: parseInt(document.getElementById('formDana').value),
                Skema: document.getElementById('formSkema').value,
                Jurusan: document.getElementById('formJurusan').value,
                Jenis: document.getElementById('formJenis').value
            };

            if (id) {
                await updateDoc(doc(db, "hibah", id), newData);
                alert("Data berhasil diupdate!");
            } else {
                await addDoc(collection(db, "hibah"), newData);
                alert("Data berhasil ditambahkan!");
            }
            closeModal();
        }
        
        // Fungsi updateDashboard, renderTable, dll dipanggil di dalam onSnapshot
    </script>
</body>
</html>
